name: Android Smoke Test

# Installs the app on a real emulator for every Android version we support,
# launches it, and fails if it crashes or never reaches the WebView.
# No build ships to the client unless this is green on all API levels.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Commit/branch to test (use an old commit to prove the test catches a regression)'
        required: false
        default: ''

env:
  APP_ID: com.haitibiznis.msouwout
  ACTIVITY: com.msouwout.app.MainActivity

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.sha }}

      - name: Clone MsouWout website
        run: git clone --depth 1 https://github.com/anirudhatalmale6-alt/msouwout.git ../msouwout-site

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      # Debug build: signed with the debug key so the emulator can install it,
      # same application code as release.
      - name: Assemble debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 3

  smoke:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - api: 24
            android: 'Android 7.0'
          - api: 28
            android: 'Android 9'
          - api: 30
            android: 'Android 11'
          - api: 33
            android: 'Android 13'
          - api: 34
            android: 'Android 14'
          - api: 35
            android: 'Android 15'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: debug-apk

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Launch on ${{ matrix.android }} (API ${{ matrix.api }})
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api }}
          target: google_apis
          arch: x86_64
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: bash scripts/smoke-test.sh app-debug.apk

      - name: Upload logcat on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logcat-api${{ matrix.api }}
          path: logcat-full.txt
          retention-days: 7
